---
name: Swift
on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SwiftCross is pure Swift with zero system-library dependencies, so every
# job is just "set up the toolchain, build, test" — no Homebrew / apt /
# vcpkg steps like a package with C deps would need.

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # macos-latest ships an older Xcode; the package's tools-version is 6.2.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Build + test on the iOS Simulator to prove the shims behave under a
    # sandboxed Apple platform (no `Host.current()`, etc.).
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -scheme SwiftCross \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test

  build-linux:
    # Linux: full build + test. swift-corelibs-foundation is where most of
    # the shims actually kick in (FoundationNetworking AsyncBytes, the UTType
    # stand-in, the charset fallback table), so this is the primary signal.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build --no-parallel

  build-android:
    # Library-only compile against the swift.org Android SDK. The XCTest
    # bundle is an executable and trips the action's standalone-Bionic-ELF
    # link path, so we build the SwiftCross library target directly and skip
    # the emulator/test phase — compiling the library is what proves the
    # Android arms of the shims (gethostname path, FoundationNetworking
    # AsyncBytes, the UTType stand-in) are sound.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift Android SDK
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3.2"
          free-disk-space: true
          build-package: false
          build-tests: false
          run-tests: false
      - name: Build library (Android)
        run: swift build --swift-sdk "$SWIFT_SDK_TARGET" --target SwiftCross
