---
name: Swift
on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SwiftCross is pure Swift with zero system-library dependencies, so every
# job is just "set up the toolchain, build, test" — no Homebrew / apt /
# vcpkg steps like a package with C deps would need.

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # macos-latest ships an older Xcode; the package's tools-version is 6.2.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Compile the library + tests for the iOS Simulator to prove the shims
    # build under a sandboxed Apple platform. We use `build-for-testing`
    # against a generic Simulator destination rather than `test` against a
    # named device — runner simulator inventory varies (the `iPhone 16`
    # device isn't always present), and the actual test *run* happens on the
    # macOS leg, which exercises identical Darwin Foundation behaviour.
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build for testing (iOS Simulator)
        run: |
          xcodebuild build-for-testing \
            -scheme SwiftCross \
            -destination 'generic/platform=iOS Simulator'

  build-linux:
    # Linux: full build + test. swift-corelibs-foundation is where most of
    # the shims actually kick in (FoundationNetworking AsyncBytes, the UTType
    # stand-in, the charset fallback table), so this is the primary signal.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build --no-parallel

  build-android:
    # Full build + unit-test run on the Android emulator. SwiftCross is pure
    # Swift with no C dependencies and no executable targets, so the XCTest
    # bundle links and runs cleanly under the swift.org Android SDK — letting
    # the action build the package, build the tests, and run them on an
    # emulator (all defaults). All suites are network-free and deterministic,
    # so they're emulator-safe.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Build + test (Android emulator)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3.2"
          free-disk-space: true
